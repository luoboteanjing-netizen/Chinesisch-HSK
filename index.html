<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HSK Flashcard-App</title>
  
  <!-- Leeres Favicon – kein 404-Fehler -->
  <link rel="icon" href="data:;base64,iVBORw0KGgo=">
  
  <!-- XLSX-Lib lokal (heruntergeladen) – kein CDN-Block -->
  <script src="./xlsx.full.min.js"></script>
  
  <!-- CSS: Flip, Positionierung, Styles -->
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
    .section { margin-bottom: 20px; padding: 10px; border: 1px solid #ddd; background: white; border-radius: 8px; }
    label { display: block; margin: 5px 0; font-weight: bold; }
    input[type="radio"], input[type="checkbox"] { margin-right: 5px; }
    button { padding: 10px 15px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #0056b3; }
    button:disabled { background: #ccc; }
    #card { perspective: 1000px; height: 200px; margin: 20px 0; }
    .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
    .card.flipped .card-inner { transform: rotateY(180deg); }
    .card-side { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; background: #fff; border: 2px solid #ddd; border-radius: 8px; padding: 20px; box-sizing: border-box; }
    .card-side.back { transform: rotateY(180deg); }
    #promptWord, #solutionWord { font-size: 24px; text-align: center; }
    .card-info { font-size: 14px; color: #666; margin-bottom: 10px; }
    .emphasis { font-weight: bold; color: #007bff; }
    .controls { display: flex; justify-content: space-around; flex-wrap: wrap; }
    #lblKarte { /* Platz für ID-Label – dynamisch */ position: relative; top: 0; left: 0; }
    /* Autoplay/Voice-Position: Rechts oben */
    #voiceSection { float: right; margin-left: auto; }
  </style>
</head>
<body>
  <h1>HSK Flashcard-Training</h1>
  
  <!-- Settings-Section -->
  <div class="section">
    <h2>Einstellungen</h2>
    <label>Modus:</label>
    <input type="radio" name="mode" value="word" id="modeWord" checked> <label for="modeWord">Wort</label>
    <input type="radio" name="mode" value="sent" id="modeSent"> <label for="modeSent">Satz</label><br>
    
    <label>Reihenfolge:</label>
    <input type="radio" name="order" value="random" id="orderRandom" checked> <label for="orderRandom">Random</label>
    <input type="radio" name="order" value="seq" id="orderSeq"> <label for="orderSeq">Sequentiell</label><br>
    
    <!-- Voice/Autoplay-Toggle: Neu positioniert rechts -->
    <div id="voiceSection">
      <label>Voice (Autoplay bei Karte):</label>
      <input type="checkbox" id="voiceToggle" checked> Aktiv
    </div>
  </div>
  
  <!-- Lektion-Section -->
  <div class="section">
    <h2>Lektion wählen</h2>
    <select id="lessonSelect">
      <option value="">Laden...</option>  <!-- Wird per JS gefüllt -->
    </select>
    <button id="loadBtn">Übernehmen</button>  <!-- Baut Pool -->
  </div>
  
  <!-- Training-Controls (versteckt bis Start) -->
  <div class="section" id="trainingControls" style="display: none;">
    <h2>Training</h2>
    <button id="startBtn">Training starten</button>
    <div class="controls">
      <button id="flipBtn">Flip</button>
      <button id="learnBtn">Gelernt (Next)</button>
      <button id="moreBtn">Mehr üben</button>
      <button id="stopBtn">Stop</button>
    </div>
    <button id="nextBtn" style="display: none;">Nächste (Learned)</button>  <!-- Alternative Next -->
  </div>
  
  <!-- Karte-Section -->
  <div class="section">
    <h2>Karte</h2>
    <div id="lblKarte" class="card-info">Karte: —</div>  <!-- Dynamisch: ID + (1/18) -->
    <div id="card">
      <div class="card-inner">
        <!-- Vorderseite: Prompt (PY) -->
        <div class="card-side front">
          <div id="promptWord">Lade Karte...</div>
        </div>
        <!-- Rückseite: Solution (ZH + POS) -->
        <div class="card-side back">
          <div id="solutionWord">Lade Lösung...</div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- JS laden (dein app.js mit Parse-Fix) -->
  <script src="./app.js"></script>
</body>
</html>
